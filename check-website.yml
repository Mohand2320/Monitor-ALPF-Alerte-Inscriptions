name: 🔍 Monitor ALPF Website - Inscriptions

on:
  schedule:
    # Deux vérifications par jour : 8h00 et 20h00 (UTC)
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

jobs:
  check-website:
    name: Vérifier le message d'inscriptions fermées
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Télécharger le contenu du site
        id: fetch
        run: |
          echo "Fetching website content..."
          HTTP_STATUS=$(curl -s -o /tmp/page.html -w "%{http_code}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "https://alpf.imar-promotion.com/")
          
          echo "http_status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          echo "HTTP Status: $HTTP_STATUS"

      - name: 🔎 Vérifier la présence du message "inscriptions fermées"
        id: check
        run: |
          # Le message à surveiller
          MESSAGE="les inscriptions ont été fermées"
          
          if grep -qi "$MESSAGE" /tmp/page.html; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "✅ Message trouvé — inscriptions toujours fermées."
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "🚨 Message DISPARU — les inscriptions sont peut-être ouvertes !"
          fi

      - name: 📧 Envoyer un email si les inscriptions sont ouvertes
        if: steps.check.outputs.found == 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "GitHub Monitor <${{ secrets.GMAIL_USER }}>"
          subject: "🎓 ALPF — Les inscriptions sont peut-être ouvertes !"
          html_body: |
            <div style="font-family: Arial, sans-serif; max-width: 600px; margin: auto; padding: 24px; border: 2px solid #2563eb; border-radius: 12px;">
              <h2 style="color: #2563eb;">🎓 Alerte — Site ALPF imar-promotion</h2>
              
              <p style="font-size: 16px; color: #111;">
                Le message <em>"les inscriptions ont été fermées"</em> a 
                <strong style="color: #dc2626;">disparu</strong> du site web.
              </p>

              <p style="font-size: 15px;">
                👉 Cela signifie que les inscriptions sont probablement <strong>ouvertes</strong> ou que la page a changé.
              </p>

              <a href="https://alpf.imar-promotion.com/" 
                 style="display:inline-block; margin-top:16px; padding: 12px 24px; background:#2563eb; color:#fff; text-decoration:none; border-radius:8px; font-weight:bold;">
                Visiter le site maintenant →
              </a>

              <hr style="margin-top: 32px; border-color: #e5e7eb;">
              <p style="font-size: 12px; color: #9ca3af;">
                Détection effectuée le : ${{ github.event.repository.updated_at }}<br>
                Workflow GitHub Actions — Monitor ALPF
              </p>
            </div>

      - name: ✅ Résumé du run
        run: |
          echo "=================================="
          echo "Site      : https://alpf.imar-promotion.com/"
          echo "Statut HTTP : ${{ steps.fetch.outputs.http_status }}"
          echo "Message trouvé : ${{ steps.check.outputs.found }}"
          echo "Email envoyé : ${{ steps.check.outputs.found == 'false' }}"
          echo "=================================="
